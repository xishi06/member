<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>熹詩美學 會員中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root {
    --cream: #F6F0E4;
    --card: #FFFBF2;
    --gold: #B8935F;
    --gold-deep: #8C6B3F;
    --line-gold: #D9C39A;
    --ink: #4A3728;
    --ink-soft: #8A7860;
    --ink-muted: #A69378;
    --gift-bg: #FBEFE7;
    --gift-text: #B0533F;
    --gift-border: #E8C4AC;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--cream);
    background-image: radial-gradient(circle at 50% 0%, #FBF7EE 0%, var(--cream) 60%);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 32px 20px 60px;
  }
  .wrap { width: 100%; max-width: 420px; }
  .brand { text-align: center; margin-bottom: 28px; }
  .brand .mark {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    letter-spacing: 0.4em;
    color: var(--gold-deep);
  }
  .brand .sub {
    margin-top: 4px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-muted);
    text-transform: uppercase;
  }
  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--line-gold);
    border-radius: 18px;
    padding: 32px 28px 26px;
    box-shadow: 0 18px 40px -20px rgba(140, 107, 63, 0.35);
    overflow: hidden;
  }
  .card::before {
    content: "熹";
    position: absolute;
    right: -18px;
    bottom: -30px;
    font-family: 'Noto Serif TC', serif;
    font-size: 160px;
    color: var(--gold);
    opacity: 0.06;
    line-height: 1;
  }
  .name-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    position: relative;
    z-index: 1;
  }
  .name { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 22px; }
  .tier {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold-deep);
    border: 1px solid var(--line-gold);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 22px 0 4px; color: var(--line-gold);
  }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line-gold); }
  .divider span { font-size: 12px; }

  .course-item {
    padding: 18px 0;
    border-bottom: 1px solid #EFE6D3;
    position: relative; z-index: 1;
  }
  .course-item:last-child { border-bottom: none; padding-bottom: 0; }
  .course-top-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .course-name { font-size: 14px; font-weight: 600; color: var(--ink); }
  .course-type-tag {
    font-size: 10px; letter-spacing: 0.05em;
    color: var(--gold-deep);
    background: #F3E9D6;
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .course-type-tag.gift {
    color: var(--gift-text);
    background: var(--gift-bg);
    border: 1px solid var(--gift-border);
  }
  .course-item.gift {
    background: linear-gradient(180deg, rgba(251,239,231,0.6), transparent);
    margin: 0 -10px;
    padding: 16px 10px;
    border-radius: 12px;
    border-bottom: 1px dashed var(--gift-border);
  }
  .course-balance {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px; font-weight: 700; color: var(--gold-deep);
  }
  .course-balance span { font-size: 12px; font-weight: 500; margin-left: 4px; color: var(--ink-muted); }
  .course-progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-soft); margin-bottom: 6px; }
  .course-note {
    margin-top: 8px;
    font-size: 11px;
    color: var(--gift-text);
    background: var(--gift-bg);
    border-radius: 6px;
    padding: 5px 9px;
    display: inline-block;
  }
  .progress-bar { height: 6px; border-radius: 999px; background: #EFE6D3; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--gold), var(--gold-deep));
    width: 0%; transition: width 0.8s ease;
  }
  .progress-fill.gift {
    background: linear-gradient(90deg, #D98A6C, var(--gift-text));
  }

  .state { text-align: center; padding: 40px 0 20px; color: var(--ink-muted); font-size: 14px; }
  .footnote { text-align: center; margin-top: 22px; font-size: 11px; color: var(--ink-muted); letter-spacing: 0.05em; }
  .uid-box {
    margin: 0 20px 20px;
    padding: 14px;
    background: #FBF7EE;
    border: 1px dashed var(--line-gold);
    border-radius: 10px;
    font-size: 12px;
    color: var(--ink-soft);
    word-break: break-all;
    text-align: center;
  }
  .uid-box b { color: var(--gold-deep); display: block; margin-bottom: 6px; font-size: 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="mark">熹 詩 美 學</div>
      <div class="sub">XISHI AESTHETICS</div>
    </div>
    <div id="content" class="card">
      <div class="state" id="state">會員中心載入中...</div>
    </div>
    <div id="uidBox"></div>
    <div class="footnote">如資料有誤，請洽櫃檯協助更新</div>
  </div>

<script>
  const LIFF_ID = "2010654737-pdcVAWh6";
  const API_URL = "https://script.google.com/macros/s/AKfycbwznhk-X9suzFiAFDax9oetes93ISVoWiF5wVpipy_kWC43V298WQrdZmuFzvdphthnRg/exec";

  // 排序優先度：贈禮最上面，其次堂數，最後儲值
  const TYPE_ORDER = { "贈禮": 0, "堂數": 1, "儲值": 2 };

  const cardEl = document.getElementById("content");
  const uidBoxEl = document.getElementById("uidBox");

  function renderState(msg) {
    cardEl.innerHTML = `<div class="state">${msg}</div>`;
  }

  function showUid(userId) {
    uidBoxEl.innerHTML = `<div class="uid-box"><b>您的專屬編號（請截圖給店家）</b>${userId}</div>`;
  }

  function renderCourseBody(c, isGift) {
    const type = (c.type || "").toString().trim();

    if (type === "儲值") {
      const balance = Number(c.balance || 0);
      const totalBalance = Number(c.totalBalance || 0);
      if (totalBalance > 0) {
        const percent = Math.min(100, Math.round((balance / totalBalance) * 100));
        return `
          <div class="course-balance">NT$ ${balance.toLocaleString()}<span>剩餘 / 共儲值 NT$ ${totalBalance.toLocaleString()}</span></div>
          <div class="progress-bar" style="margin-top:8px;"><div class="progress-fill" style="width:${percent}%"></div></div>
        `;
      }
      return `<div class="course-balance">NT$ ${balance.toLocaleString()}<span>儲值餘額</span></div>`;
    }

    // 堂數 或 贈禮 都用堂數進度顯示
    const used = Number(c.usedSessions || 0);
    const total = Number(c.totalSessions || 0);
    const percent = total > 0 ? Math.min(100, Math.round((used / total) * 100)) : 0;
    return `
      <div class="course-progress-top">
        <span>課程堂數</span>
        <span>${used} / ${total || "-"}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill ${isGift ? "gift" : ""}" style="width:${percent}%"></div></div>
    `;
  }

  function renderCard(data) {
    const name = data.name || "親愛的貴賓";
    let courses = Array.isArray(data.courses) ? data.courses.slice() : [];

    courses.sort((a, b) => {
      const ta = (a.type || "").toString().trim();
      const tb = (b.type || "").toString().trim();
      const oa = TYPE_ORDER.hasOwnProperty(ta) ? TYPE_ORDER[ta] : 1;
      const ob = TYPE_ORDER.hasOwnProperty(tb) ? TYPE_ORDER[tb] : 1;
      return oa - ob;
    });

    const coursesHtml = courses.map((c) => {
      const type = (c.type || "").toString().trim();
      const isGift = type === "贈禮";
      const tagLabel = isGift ? "當月贈禮" : (type === "儲值" ? "儲值制" : "堂數制");
      const noteHtml = c.note ? `<div class="course-note">${c.note}</div>` : "";
      return `
        <div class="course-item ${isGift ? "gift" : ""}">
          <div class="course-top-row">
            <div class="course-name">${c.courseName || "未命名課程"}</div>
            <div class="course-type-tag ${isGift ? "gift" : ""}">${tagLabel}</div>
          </div>
          ${renderCourseBody(c, isGift)}
          ${noteHtml}
        </div>
      `;
    }).join("");

    cardEl.innerHTML = `
      <div class="name-row">
        <div class="name">${name}</div>
        <div class="tier">VIP MEMBER</div>
      </div>
      <div class="divider"><span>◆</span></div>
      ${coursesHtml || '<div class="state">尚無課程資料</div>'}
    `;
  }

  liff.init({ liffId: LIFF_ID })
    .then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      return liff.getProfile();
    })
    .then((profile) => {
      if (!profile) return;
      const userId = profile.userId;
      showUid(userId);
      return fetch(`${API_URL}?userId=${encodeURIComponent(userId)}`)
        .then((res) => res.json())
        .then((data) => {
          if (data.error === "not_found") {
            renderState("尚未建立會員資料，請洽櫃檯協助開卡");
          } else if (data.error) {
            renderState("資料讀取失敗，請稍後再試");
          } else {
            renderCard(data);
          }
        });
    })
    .catch((err) => {
      console.error(err);
      renderState("載入失敗，請確認網路連線後重新整理");
    });
</script>
</body>
</html>
