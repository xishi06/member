<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>熹詩美學 會員卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root {
--cream: #F6F0E4;
--card: #FFFBF2;
--gold: #B8935F;
--gold-deep: #8C6B3F;
--line-gold: #D9C39A;
--ink: #4A3728;
--ink-soft: #8A7860;
--ink-muted: #A69378;
}
* { box-sizing: border-box; }
body {
margin: 0;
min-height: 100vh;
background: var(--cream);
background-image: radial-gradient(circle at 50% 0%, #FBF7EE 0%, var(--cream) 60%);
font-family: 'Noto Sans TC', sans-serif;
color: var(--ink);
display: flex;
justify-content: center;
padding: 32px 20px 60px;
}
.wrap { width: 100%; max-width: 420px; }
.brand { text-align: center; margin-bottom: 28px; }
.brand .mark {
font-family: 'Noto Serif TC', serif;
font-size: 15px;
letter-spacing: 0.4em;
color: var(--gold-deep);
}
.brand .sub {
margin-top: 4px;
font-size: 10px;
letter-spacing: 0.3em;
color: var(--ink-muted);
text-transform: uppercase;
}
.card {
position: relative;
background: var(--card);
border: 1px solid var(--line-gold);
border-radius: 18px;
padding: 32px 28px 26px;
box-shadow: 0 18px 40px -20px rgba(140, 107, 63, 0.35);
overflow: hidden;
}
.card::before {
content: "熹";
position: absolute;
right: -18px;
bottom: -30px;
font-family: 'Noto Serif TC', serif;
font-size: 160px;
color: var(--gold);
opacity: 0.06;
line-height: 1;
}
.name-row {
display: flex;
justify-content: space-between;
align-items: baseline;
position: relative;
z-index: 1;
}
.name { font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 22px; }
.tier {
font-size: 11px;
letter-spacing: 0.15em;
color: var(--gold-deep);
border: 1px solid var(--line-gold);
padding: 3px 10px;
border-radius: 999px;
}
.divider {
display: flex; align-items: center; gap: 10px;
margin: 22px 0 18px; color: var(--line-gold);
}
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--line-gold); }
.divider span { font-size: 12px; }
.balance-label { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.1em; position: relative; z-index: 1; }
.balance-value {
font-family: 'Noto Serif TC', serif;
font-size: 40px; font-weight: 700; color: var(--gold-deep);
margin-top: 4px; position: relative; z-index: 1;
}
.balance-value span { font-size: 16px; font-weight: 500; margin-left: 4px; }
.progress-block { margin-top: 24px; position: relative; z-index: 1; }
.progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; }
.progress-bar { height: 6px; border-radius: 999px; background: #EFE6D3; overflow: hidden; }
.progress-fill {
height: 100%; border-radius: 999px;
background: linear-gradient(90deg, var(--gold), var(--gold-deep));
width: 0%; transition: width 0.8s ease;
}
.meta-row {
display: flex; justify-content: space-between;
margin-top: 22px; font-size: 12px; color: var(--ink-muted);
position: relative; z-index: 1;
}
.state { text-align: center; padding: 60px 0; color: var(--ink-muted); font-size: 14px; }
.footnote { text-align: center; margin-top: 22px; font-size: 11px; color: var(--ink-muted); letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="wrap">
<div class="brand">
<div class="mark">熹 詩 美 學</div>
<div class="sub">XISHI AESTHETICS</div>
</div>
<div id="content" class="card">
<div class="state" id="state">會員卡載入中...</div>
</div>
<div class="footnote">如資料有誤，請洽櫃檯協助更新</div>
</div>

<script>
const LIFF_ID = "YOUR_LIFF_ID";
const API_URL = "https://script.google.com/macros/s/AKfycbwznhk-X9suzFiAFDax9oetes93ISVoWiF5wVpipy_kWC43V298WQrdZmuFzvdphthnRg/exec";

const cardEl = document.getElementById("content");

function renderState(msg) {
cardEl.innerHTML = `<div class="state">${msg}</div>`;
}

function renderCard(data) {
const balance = Number(data.balance || 0);
const used = Number(data.usedSessions || 0);
const total = Number(data.totalSessions || 0);
const percent = total > 0 ? Math.min(100, Math.round((used / total) * 100)) : 0;

cardEl.innerHTML = `
<div class="name-row">
<div class="name">${data.name || "親愛的貴賓"}</div>
<div class="tier">VIP MEMBER</div>
</div>
<div class="divider"><span>◆</span></div>
<div class="balance-label">儲值餘額</div>
<div class="balance-value">NT$ ${balance.toLocaleString()}</div>
<div class="progress-block">
<div class="progress-top">
<span>療程堂數</span>
<span>${used} / ${total || "-"}</span>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
</div>
<div class="meta-row">
<span>會員效期</span>
<span>${data.expireDate || "—"}</span>
</div>
`;
}

liff.init({ liffId: LIFF_ID })
.then(() => {
if (!liff.isLoggedIn()) {
liff.login();
return;
}
return liff.getProfile();
})
.then((profile) => {
if (!profile) return;
const userId = profile.userId;
return fetch(`${API_URL}?userId=${encodeURIComponent(userId)}`)
.then((res) => res.json())
.then((data) => {
if (data.error === "not_found") {
renderState("尚未建立會員資料，請洽櫃檯協助開卡");
} else if (data.error) {
renderState("資料讀取失敗，請稍後再試");
} else {
renderCard(data);
}
});
})
.catch((err) => {
console.error(err);
renderState("載入失敗，請確認網路連線後重新整理");
});
</script>
</body>
</html>
